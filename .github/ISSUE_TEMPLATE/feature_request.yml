name: Feature request
description: Propose a new feature or enhancement.
title: 'feat: '
labels:
  - enhancement
  - needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: The problem this feature would solve. Describe the use case, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How the feature should behave. Include API shape or config surface if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why they were rejected.
    validations:
      required: false
  - type: checkboxes
    id: pr
    attributes:
      label: Willing to submit a PR
      options:
        - label: I am willing to submit a pull request for this change.
          required: false
