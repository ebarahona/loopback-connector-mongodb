version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    groups:
      eslint:
        patterns:
          - 'eslint'
          - '@typescript-eslint/*'
          - 'eslint-*'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      commitlint:
        patterns:
          - '@commitlint/*'
      loopback:
        patterns:
          - '@loopback/*'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
