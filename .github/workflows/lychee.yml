name: Link check

on:
  pull_request:
    branches: [main]
    paths:
      - '**.md'
      - '.github/workflows/lychee.yml'
      - 'lychee.toml'
  push:
    branches: [main]
    paths:
      - '**.md'
  schedule:
    - cron: '0 8 * * 4'

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 5 --config lychee.toml './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
