name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - name: Check DCO
        uses: tim-actions/dco@2fd0504dc0d27b33f542867c300c60840c6dcb20
        with:
          commits: ${{ github.event.pull_request.commits_url }}
