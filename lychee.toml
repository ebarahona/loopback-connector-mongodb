# Configuration for lycheeverse/lychee-action
# https://lychee.cli.rs/usage/config/

max_redirects = 5
max_retries = 2
timeout = 20
include_verbatim = false

exclude = [
  # GitHub link patterns that 200/302 but rate-limit aggressively
  '^https://github\.com/.+/(issues|pull|security|releases)/.*$',
  # release-please-generated cross-tag compare URLs that 404 when the
  # tag naming format shifts between versions (e.g. v1.0.0 vs the
  # package-prefixed loopback-connector-mongodb-v1.x.x form).
  '^https://github\.com/.+/compare/.+\.\.\..+$',
  # Local file references inside fenced code blocks that aren't actual URLs
  '^file://',
]

exclude_path = [
  "node_modules",
  "dist",
  ".husky/_",
]

cache = true
max_cache_age = "1d"
